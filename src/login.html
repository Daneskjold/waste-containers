<body class="login-page">

    <main class="login">
        <section class="login__card" aria-labelledby="login-title">
            <h1 class="login__title" id="login-title">Учёт контейнеров</h1>
            <p class="login__subtitle">Войдите для доступа к системе</p>

            <form class="login__form" id="loginForm">
                <fieldset class="login__fieldset">
                    <div class="form-group">
                        <label class="form-group__label" for="username">Логин</label>
                        <input class="form-group__input" type="text" id="username" name="username"
                            autocomplete="username" placeholder="Введите логин" required>
                    </div>

                    <div class="form-group">
                        <label class="form-group__label" for="password">Пароль</label>
                        <input class="form-group__input" type="password" id="password" name="password"
                            autocomplete="current-password" placeholder="Введите пароль" required>
                    </div>
                </fieldset>

                <p class="login__error" id="loginError" role="alert" hidden>
                    Неверный логин или пароль
                </p>

                <button class="btn btn--primary btn--full" type="submit">
                    Войти
                </button>
            </form>
        </section>
    </main>

    <script src="js/script.min.js"></script>
</body>
