<body>

    <div class="layout">

        <aside class="sidebar" aria-label="Боковая панель">
            <div class="sidebar__top">

                <div class="sidebar__logo">
                    <a class="sidebar__logo-link" href="#">Контейнеры</a>
                </div>
                <button class="sidebar__burger" type="button" id="burgerBtn" aria-label="Открыть меню" aria-expanded="false">
                    <span class="sidebar__burger-line"></span>
                    <span class="sidebar__burger-line"></span>
                    <span class="sidebar__burger-line"></span>
                </button>
            </div>
            <nav class="sidebar__nav" id="sidebarNav" aria-label="Основная навигация">
                <ul class="sidebar__list">
                    <li class="sidebar__item">
                        <a href="dashboard.html" class="sidebar__link" aria-current="page">
                            <span class="sidebar__icon" aria-hidden="true">📊</span>
                            Главная
                        </a>
                    </li>
                    <li class="sidebar__item">
                        <a href="platforms.html" class="sidebar__link">
                            <span class="sidebar__icon" aria-hidden="true">📍</span>
                            Площадки
                        </a>
                    </li>
                    <li class="sidebar__item">
                        <a href="companies.html" class="sidebar__link sidebar__link--active">
                            <span class="sidebar__icon" aria-hidden="true">🏢</span>
                            Компании
                        </a>
                    </li>
                    <li class="sidebar__item">
                        <a href="buildings.html" class="sidebar__link">
                            <span class="sidebar__icon" aria-hidden="true">🏠</span>
                            Дома
                        </a>
                    </li>
                </ul>

            </nav>
            <button class="sidebar__logout" type="button" id="logoutBtn">
                <span aria-hidden="true">🚪</span> Выйти
            </button>
        </aside>

        <main class="companies">

            <div class="companies__header">
                <h1 class="companies__title">Управляющие компании</h1>
                <button class="btn btn--primary" type="button" id="addCompanyBtn">
                    <span class="btn__icon" aria-hidden="true">+</span>
                    <span class="btn__text">Добавить</span>
                </button>
            </div>

            <div class="card">
                
                    <table class="card__table table" >
                        <caption class="visually-hidden" id="companies-caption">Список управляющих компаний</caption>
                        <thead class="table__head">
                            <tr class="table__row">
                                <th class="table__cell" scope="col">Название</th>
                                <th class="table__cell" scope="col">Телефон</th>
                                <th class="table__cell" scope="col">Email</th>
                                <th class="table__cell" scope="col">Действия</th>
                            </tr>
                        </thead>
                        <tbody id="companiesTableBody">
                        </tbody>
                    </table>
                

                <p class="card__empty-state empty-state" id="emptyState" role="status">
                    <span class="empty-state__icon" aria-hidden="true">🏢</span>
                    <span class="empty-state__text">Компании ещё не добавлены</span>
                </p>
            </div>

        </main>

    </div>

    <!-- Модалка: Добавить / Редактировать -->
    <div class="modal-overlay" id="companyModal" role="dialog" aria-labelledby="modalTitle" aria-modal="true">
        <div class="modal">
            <h2 class="modal__title" id="modalTitle">Добавить компанию</h2>
            <form id="companyForm">
                <input type="hidden" id="companyId">

                <div class="form-group">
                    <label class="form-group__label" for="companyName">Название *</label>
                    <input class="form-group__input" type="text" id="companyName"
                        placeholder="ООО «ЭкоСервис»" required>
                </div>

                <div class="form-group">
                    <label class="form-group__label" for="companyPhone">Телефон</label>
                    <input class="form-group__input" type="tel" id="companyPhone"
                        placeholder="+7 (999) 123-45-67">
                </div>

                <div class="form-group">
                    <label class="form-group__label" for="companyEmail">Email</label>
                    <input class="form-group__input" type="email" id="companyEmail"
                        placeholder="info@company.ru">
                </div>

                <div class="modal__buttons">
                    <button type="button" class="btn btn--outline" id="cancelCompanyBtn">
                        Отмена
                    </button>
                    <button type="submit" class="btn btn--primary">
                        Сохранить
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Модалка: Подтверждение удаления -->
    <div class="modal-overlay" id="deleteModal" role="dialog" aria-labelledby="deleteTitle" aria-modal="true">
        <div class="modal">
            <h2 class="modal__title" id="deleteTitle">Удалить компанию?</h2>
            <p class="modal__text">Это действие нельзя отменить.</p>
            <div class="modal__buttons">
                <button class="btn btn--outline" type="button" id="cancelDeleteBtn">Отмена</button>
                <button class="btn btn--danger" type="button" id="confirmDeleteBtn">Удалить</button>
            </div>
        </div>
    </div>

    <script src="js/script.min.js"></script>
</body>

</html>
