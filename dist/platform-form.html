<body>

    <div class="layout">

        <aside class="sidebar" aria-label="Боковая панель">
            <div class="sidebar__top">
                <div class="sidebar__logo">
                    <a class="sidebar__logo-link" href="#">Контейнеры</a>
                </div>
                <button class="sidebar__burger" type="button" id="burgerBtn" aria-label="Открыть меню"
                    aria-expanded="false">
                    <span class="sidebar__burger-line"></span>
                    <span class="sidebar__burger-line"></span>
                    <span class="sidebar__burger-line"></span>
                </button>
            </div>
            <nav class="sidebar__nav" id="sidebarNav" aria-label="Основная навигация">
                <ul class="sidebar__list">
                    <li class="sidebar__item">
                        <a href="dashboard.html" class="sidebar__link">
                            <span class="sidebar__icon" aria-hidden="true">📊</span>
                            Главная
                        </a>
                    </li>
                    <li class="sidebar__item">
                        <a href="platforms.html" class="sidebar__link sidebar__link--active" aria-current="page">
                            <span class="sidebar__icon" aria-hidden="true">📍</span>
                            Площадки
                        </a>
                    </li>
                    <li class="sidebar__item">
                        <a href="companies.html" class="sidebar__link">
                            <span class="sidebar__icon" aria-hidden="true">🏢</span>
                            Компании
                        </a>
                    </li>
                    <li class="sidebar__item">
                        <a href="buildings.html" class="sidebar__link">
                            <span class="sidebar__icon" aria-hidden="true">🏠</span>
                            Дома
                        </a>
                    </li>
                </ul>
            </nav>
            <button class="sidebar__logout" type="button" id="logoutBtn">
                <span aria-hidden="true">🚪</span> Выйти
            </button>
        </aside>

        <main class="platform-form">

            <h1 class="platform-form__title" id="pageTitle">Новая площадка</h1>

            <form class="platform-form__body" id="platformForm">

                <!-- Расположение -->
                <fieldset class="platform-form__section card">
                    <legend class="card__title">
                        <span aria-hidden="true">📍</span> Расположение
                    </legend>

                    <div class="form-group">
                        <label class="form-group__label" for="platformAddress">
                            Адрес площадки
                            <span aria-hidden="true">*</span>
                        </label>
                        <input class="form-group__input" type="text" id="platformAddress" name="address"
                            placeholder="ул. Ленина, у дома 15" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-group__label" for="platformLat">
                                Широта (WGS 84)
                                <span aria-hidden="true">*</span>
                            </label>
                            <input class="form-group__input" type="text" id="platformLat" name="latitude"
                                inputmode="decimal" pattern="-?\d{1,2}(\.\d+)?" placeholder="55.75222200" required>
                        </div>
                        <div class="form-group">
                            <label class="form-group__label" for="platformLng">
                                Долгота (WGS 84)
                                <span aria-hidden="true">*</span>
                            </label>
                            <input class="form-group__input" type="text" id="platformLng" name="longitude"
                                inputmode="decimal" pattern="-?\d{1,3}(\.\d+)?" placeholder="37.61555600" required>
                        </div>
                    </div>
                </fieldset>

                <!-- Управляющая компания -->
                <fieldset class="platform-form__section card">
                    <legend class="card__title"><span aria-hidden="true">🏢</span> Управляющая компания</legend>

                    <div class="form-group">
                        <label class="form-group__label" for="platformCompany">
                            Компания
                            <span aria-hidden="true">*</span>
                        </label>
                        <select class="form-group__select" id="platformCompany" name="company" required>
                            <option value="">— Выберите компанию —</option>
                        </select>
                    </div>
                </fieldset>

                <!-- Контейнеры -->
                <fieldset class="platform-form__section card">
                    <legend class="card__title"><span aria-hidden="true">🗑️</span> Контейнеры</legend>

                    <ul class="platform-form__containers" id="containersList" aria-label="Список контейнеров" aria-live="polite">
                    </ul>

                    <button class="btn btn--outline" type="button" id="addContainerBtn">
                        <span class="btn__icon" aria-hidden="true">+</span>
                        <span class="btn__text">Добавить контейнер</span>
                    </button>
                </fieldset>

                <!-- Обслуживаемые дома -->
                <fieldset class="platform-form__section card">
                    <legend class="card__title"><span aria-hidden="true">🏠</span> Обслуживаемые дома</legend>

                    <div class="platform-form__buildings" id="buildingsList" role="group"
                        aria-label="Выберите обслуживаемые дома">
                    </div>
                </fieldset>

                <!-- Кнопки -->
                <div class="platform-form__actions">
                    <a class="btn btn--outline" href="platforms.html">← Отмена</a>
                    <button class="btn btn--primary" type="submit"><span aria-hidden="true">💾</span> Сохранить</button>
                </div>

            </form>

        </main>

    </div>

    <script src="js/script.min.js"></script>
</body>

</html>
